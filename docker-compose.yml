services:
  opencode-server:
    build: .
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    volumes:
      - opencode-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  opencode-data:
